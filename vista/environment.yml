name: stressdream-vista
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pip
  - pip:
    - --extra-index-url https://download.pytorch.org/whl/cu128
    # PyTorch — cu128 wheels are compatible with driver 520+ (CUDA 12.8 runtime)
    - torch==2.9.1+cu128
    - torchvision==0.24.1+cu128
    - xformers==0.0.33.post2
    - transformers>=4.19.1
    - open-clip-torch>=2.20.0
    - omegaconf
    - einops
    - safetensors
    - pytorch-lightning
    - peft
    - kornia
    - timm
    - opencv-python
    - pillow
    - "imageio[ffmpeg]"
    - matplotlib
    - numpy
    - pyyaml
    - scipy
    - tqdm
    - clip @ git+https://github.com/openai/CLIP.git
