name: stressdream-vista
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pytorch=2.0.1
  - torchvision=0.15.2
  - pytorch-cuda=11.8
  - pip
  - pip:
    - transformers>=4.19.1
    - open-clip-torch>=2.20.0
    - omegaconf
    - einops
    - safetensors
    - pytorch-lightning
    - peft
    - kornia
    - timm
    - opencv-python
    - pillow
    - imageio
    - imageio-ffmpeg
    - matplotlib
    - numpy
    - pyyaml
    - scipy
    - tqdm
    - xformers
    - clip @ git+https://github.com/openai/CLIP.git
