name: stressdream-ctrlworld
# Install from a LOGIN node (fast internet for the PyTorch cu128 wheel).
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pip
  - pip:
    - --extra-index-url https://download.pytorch.org/whl/cu128
    - torch==2.9.1+cu128
    - torchvision==0.24.1+cu128
    - diffusers==0.36.0
    - transformers==4.57.6
    - accelerate==1.12.0
    - huggingface_hub
    - safetensors
    - einops
    - omegaconf
    - scipy
    - pandas
    - numpy
    - h5py
    - "imageio[ffmpeg]"
    - opencv-python-headless
    - pillow
    - tqdm
    - mediapy
    - decord
    - qwen-vl-utils
